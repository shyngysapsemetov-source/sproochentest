<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0a1e">
    <title>Sproochentest Prep</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --primary-glow: rgba(99, 102, 241, 0.12);
            --accent: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.25);
            --bg: #fafafd;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-light: #9a9ab0;
            --success: #10b981;
            --error: #ef4444;
            --border: #eae8f0;
            --shadow: 0 2px 12px rgba(15, 10, 30, 0.05);
            --shadow-lg: 0 8px 30px rgba(15, 10, 30, 0.08);
            --radius: 20px;
            --radius-sm: 14px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100%;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: calc(5.5rem + var(--safe-bottom));
        }

        #app { animation: viewIn 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes viewIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(150deg, #0f0a1e 0%, #1e1145 50%, #2d1b69 100%);
            color: white;
            padding: 1.4rem 1.4rem 1.15rem;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 24px rgba(15, 10, 30, 0.35);
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
            opacity: 0.5;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header h1 {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            font-size: 0.76rem;
            color: rgba(167, 139, 250, 0.75);
            margin-top: 0.15rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .header .badge {
            background: linear-gradient(135deg, var(--accent), #f97316);
            color: #1e293b;
            padding: 0.28rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.66rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            box-shadow: 0 2px 10px var(--accent-glow);
        }

        .container { padding: 1.15rem; max-width: 600px; margin: 0 auto; }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.4rem;
            margin-bottom: 1.1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.2s;
            animation: cardUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) backwards;
        }
        .card:nth-child(1) { animation-delay: 0.04s; }
        .card:nth-child(2) { animation-delay: 0.08s; }
        .card:nth-child(3) { animation-delay: 0.12s; }
        .card:nth-child(4) { animation-delay: 0.16s; }
        @keyframes cardUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--accent));
            opacity: 0;
            transition: opacity 0.25s;
        }
        .card:active { transform: scale(0.985); box-shadow: var(--shadow-lg); }
        .card:active::before { opacity: 1; }
        .card h2 { font-size: 1.15rem; font-weight: 800; margin-bottom: 0.8rem; letter-spacing: -0.02em; }
        .card h3 { font-size: 0.98rem; font-weight: 700; margin: 0.8rem 0 0.5rem; }
        .card p { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; }
        .card ul { padding-left: 1.2rem; margin: 0.5rem 0; }
        .card li { font-size: 0.88rem; margin-bottom: 0.35rem; color: var(--text-secondary); line-height: 1.6; }
        .card table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin: 0.5rem 0; }
        .card th, .card td { padding: 0.45rem 0.55rem; border: 1px solid var(--border); text-align: left; }
        .card th { background: #f5f3ff; font-weight: 600; color: var(--primary-dark); }

        .section-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-light);
            margin: 1.4rem 0 0.6rem;
            padding-left: 0.2rem;
        }

        .topic-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .topic-pill {
            padding: 0.55rem 0.95rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f5f3ff, #ede9fe);
            color: var(--primary-dark);
            border: 1px solid rgba(99, 102, 241, 0.12);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .topic-pill:active, .topic-pill.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
            transform: scale(0.94);
        }

        .phrase-item {
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .phrase-item:last-child { border-bottom: none; }
        .phrase-lux { font-weight: 700; font-size: 0.93rem; color: var(--text); }
        .phrase-en { font-size: 0.82rem; color: var(--text-secondary); font-style: italic; }

        .flashcard-container { perspective: 1200px; margin: 0.85rem 0; }
        .flashcard {
            min-height: 210px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            background: linear-gradient(150deg, #f8f7ff 0%, #eee8ff 50%, #e4dcff 100%);
            border: 2px solid rgba(99, 102, 241, 0.12);
            border-radius: var(--radius);
            padding: 2.25rem 1.75rem;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            -webkit-tap-highlight-color: transparent;
            transform-style: preserve-3d;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.06);
        }
        .flashcard:active {
            transform: rotateY(5deg) scale(0.98);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.14);
        }
        .flashcard-front { font-size: 1.25rem; font-weight: 700; line-height: 1.4; }
        .flashcard-back { font-size: 1.15rem; color: var(--primary); font-weight: 700; line-height: 1.4; }
        .flashcard-controls { display: flex; gap: 0.55rem; margin-top: 0.85rem; }
        .flashcard-controls .btn { flex: 1; }
        .flashcard-counter {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .btn {
            padding: 0.8rem 1.25rem;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 700;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
            min-height: 46px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.25);
        }
        .btn-primary:active { box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3); }
        .btn-secondary {
            background: linear-gradient(135deg, #f5f3ff, #ede9fe);
            color: var(--primary-dark);
            border: 1px solid rgba(99, 102, 241, 0.1);
        }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .btn-full { width: 100%; }
        .btn-sm { padding: 0.55rem 0.8rem; font-size: 0.8rem; min-height: 38px; border-radius: 10px; }

        .question-list { list-style: none; padding: 0; }
        .question-item {
            padding: 0.9rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            line-height: 1.55;
        }
        .question-item:last-child { border-bottom: none; }

        .collapse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 0;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            -webkit-tap-highlight-color: transparent;
        }
        .collapse-header:last-of-type { border-bottom: none; }
        .collapse-header .title { font-weight: 700; font-size: 0.92rem; }
        .collapse-header .arrow {
            color: var(--primary-light);
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            font-size: 0.75rem;
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            background: var(--primary-glow);
            border-radius: 50%;
        }
        .collapse-header.open .arrow { transform: rotate(90deg); }
        .collapse-content {
            display: none;
            padding: 0.5rem 0 0.9rem;
            animation: fadeSlide 0.3s ease;
        }
        .collapse-content.show { display: block; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin: 0.8rem 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            animation: shimmer 2.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .quiz-question {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.3rem;
            line-height: 1.5;
            letter-spacing: -0.015em;
        }
        .quiz-options { display: flex; flex-direction: column; gap: 0.65rem; }
        .quiz-option {
            padding: 0.95rem 1.1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 50px;
            display: flex;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .quiz-option:active { border-color: var(--primary); background: var(--primary-glow); transform: scale(0.98); }
        .quiz-option.correct {
            border-color: var(--success);
            background: #ecfdf5;
            box-shadow: 0 3px 12px rgba(16, 185, 129, 0.12);
            animation: pulse 0.35s ease;
        }
        .quiz-option.incorrect {
            border-color: var(--error);
            background: #fef2f2;
            animation: shake 0.35s ease;
        }
        .quiz-option.disabled { pointer-events: none; opacity: 0.6; }
        @keyframes pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        .score-display { text-align: center; padding: 2.5rem 1.25rem; }
        .score-display .score-num {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            animation: bounceIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .score-display .score-label { color: var(--text-secondary); font-size: 0.92rem; margin-top: 0.4rem; font-weight: 500; }
        @keyframes bounceIn {
            0% { transform: scale(0.4); opacity: 0; }
            60% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0;
            font-size: 0.86rem;
            font-weight: 600;
            color: var(--primary);
            background: none;
            border: none;
            cursor: pointer;
            margin-bottom: 0.8rem;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:active { transform: translateX(-3px); }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            padding: 0.55rem 0.75rem calc(0.55rem + var(--safe-bottom));
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255, 255, 255, 0.82);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            backdrop-filter: saturate(180%) blur(20px);
            border-top: 1px solid rgba(99, 102, 241, 0.06);
            box-shadow: 0 -4px 20px rgba(15, 10, 30, 0.05);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.12rem;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.35rem 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }
        .nav-item.active {
            color: var(--primary);
            background: var(--primary-glow);
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -0.55rem;
            left: 50%; transform: translateX(-50%);
            width: 18px; height: 3px;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }
        .nav-item .nav-icon { font-size: 1.4rem; line-height: 1; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin: 0.9rem 0; }
        .info-box {
            background: linear-gradient(150deg, #f8f7ff, #f0ecff);
            border-radius: var(--radius-sm);
            padding: 0.95rem;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.08);
        }
        .info-box .info-val {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .info-box .info-label { font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.15rem; font-weight: 600; }

        .tip-item { display: flex; gap: 0.7rem; padding: 0.7rem 0; align-items: flex-start; }
        .tip-icon { font-size: 1rem; line-height: 1; flex-shrink: 0; margin-top: 0.1rem; }
        .tip-text { font-size: 0.86rem; color: var(--text-secondary); line-height: 1.6; }

        @media (min-width: 768px) {
            .container { padding: 1.5rem 2rem; }
            .card { padding: 1.75rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div>
                <h1>Sproochentest</h1>
                <div class="subtitle">Luxembourg Language Test Prep</div>
            </div>
            <span class="badge">A2 / B1</span>
        </div>
    </div>
    <div class="container" id="app"></div>
    <div class="bottom-nav">
        <button class="nav-item" onclick="showView('home')" id="nav-home"><span class="nav-icon">&#127968;</span>Home</button>
        <button class="nav-item" onclick="showView('topics')" id="nav-topics"><span class="nav-icon">&#128172;</span>Topics</button>
        <button class="nav-item" onclick="showView('vocab')" id="nav-vocab"><span class="nav-icon">&#128218;</span>Vocab</button>
        <button class="nav-item" onclick="showView('phrases')" id="nav-phrases"><span class="nav-icon">&#128161;</span>Phrases</button>
        <button class="nav-item" onclick="showView('practice')" id="nav-practice"><span class="nav-icon">&#9889;</span>Practice</button>
    </div>

    <script src="data.js"></script>
    <script>
let currentView = 'home';
let viewState = {};
let flashcardState = { current: 0, flipped: false, deck: [] };

function showView(view, state) {
    currentView = view;
    if (state) viewState = state;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    const navMap = { home: 'nav-home', topics: 'nav-topics', topicDetail: 'nav-topics', vocab: 'nav-vocab', phrases: 'nav-phrases', practice: 'nav-practice', quiz: 'nav-practice', quizActive: 'nav-practice' };
    const btn = document.getElementById(navMap[view] || 'nav-home');
    if (btn) btn.classList.add('active');
    render();
    window.scrollTo(0, 0);
}

function render() {
    const app = document.getElementById('app');
    switch(currentView) {
        case 'home': app.innerHTML = renderHome(); break;
        case 'topics': app.innerHTML = renderTopics(); break;
        case 'topicDetail': app.innerHTML = renderTopicDetail(); break;
        case 'vocab': app.innerHTML = renderVocab(); break;
        case 'phrases': app.innerHTML = renderPhrases(); break;
        case 'practice': app.innerHTML = renderPractice(); break;
        case 'quiz': app.innerHTML = renderQuizSetup(); break;
        case 'quizActive': app.innerHTML = renderQuiz(); break;
    }
}

function renderHome() {
    const info = appData.examInfo;
    let html = `
        <div class="card">
            <h2>About the Test</h2>
            <p>${info.format}</p>
            <div class="info-grid">
                <div class="info-box"><div class="info-val">A2</div><div class="info-label">Speaking Level</div></div>
                <div class="info-box"><div class="info-val">B1</div><div class="info-label">Listening Level</div></div>
                <div class="info-box"><div class="info-val">50%</div><div class="info-label">Pass Mark</div></div>
                <div class="info-box"><div class="info-val">~70%</div><div class="info-label">Pass Rate</div></div>
            </div>
        </div>
        <div class="card">
            <h2>Test Structure</h2>`;
    info.sections.forEach(s => {
        html += `<h3>${s.name} <span style="color:var(--primary);font-size:0.8rem">(${s.level} • ${s.duration})</span></h3><ul>`;
        s.parts.forEach(p => html += `<li>${p}</li>`);
        html += `</ul>`;
    });
    html += `</div>
        <div class="card">
            <h2>Key Tips</h2>`;
    const icons = ['⚠️', '❌', '❌', '⏰', '🎤', '♻️', '📷', '📝'];
    info.tips.forEach((tip, i) => {
        html += `<div class="tip-item"><span class="tip-icon">${icons[i] || '✔️'}</span><span class="tip-text">${tip}</span></div>`;
    });
    html += `</div>
        <div class="card">
            <h2>Logistics</h2>
            <ul>
                <li><b>Cost:</b> ${info.logistics.cost}</li>
                <li><b>Where:</b> ${info.logistics.locations}</li>
                <li><b>Register:</b> ${info.logistics.registration}</li>
                <li><b>Results:</b> ${info.logistics.results}</li>
                <li><b>ID:</b> ${info.logistics.id}</li>
            </ul>
        </div>`;
    return html;
}

function renderTopics() {
    let html = `<p class="section-label">21 Official Speaking Topics</p><div class="card"><p style="margin-bottom:0.75rem">You’ll choose 1 of 2 random topics. Tap any topic to see practice questions.</p><div class="topic-grid">`;
    appData.topics.forEach(t => {
        html += `<div class="topic-pill" onclick="showView('topicDetail', {topicId: ${t.id}})">${t.name}</div>`;
    });
    html += `</div></div>
        <div class="card">
            <h2>Picture Description Framework</h2>
            <p style="margin-bottom:0.75rem">Use these 7 steps to fill 5 minutes:</p>`;
    appData.pictureFramework.forEach(s => {
        html += `<div class="phrase-item"><span class="phrase-lux">${s.step}. ${s.lux}</span><span class="phrase-en">${s.en}</span></div>`;
    });
    html += `</div>
        <div class="card">
            <h2>Sentence Patterns</h2>
            <p style="margin-bottom:0.75rem">Master these 6 patterns — they cover most situations:</p>`;
    appData.sentencePatterns.forEach(sp => {
        html += `<div style="padding:0.75rem 0;border-bottom:1px solid var(--border)"><div class="phrase-lux">${sp.pattern}</div><div class="phrase-en">${sp.meaning}</div><div style="margin-top:0.3rem;font-size:0.8rem;color:var(--text-light)">${sp.examples.join(' • ')}</div></div>`;
    });
    html += `</div>`;
    return html;
}

function renderTopicDetail() {
    const topic = appData.topics.find(t => t.id === viewState.topicId);
    const questions = appData.topicQuestions[topic.id] || [];
    let html = `<button class="back-btn" onclick="showView('topics')">← All Topics</button>
        <div class="card">
            <h2>${topic.name}</h2>
            <p style="margin-bottom:0.5rem;color:var(--text-secondary)">${topic.nameEn} • ${questions.length} practice questions</p>
            <ol class="question-list" style="padding-left:1.25rem">`;
    questions.forEach(q => html += `<li class="question-item">${q}</li>`);
    html += `</ol></div>
        <div class="card" style="background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#fde68a">
            <h3 style="color:#92400e">💡 Tip</h3>
            <p style="color:#78350f">Prepare 2-3 sentences for each question. The same stories about your life work across multiple topics!</p>
        </div>`;
    return html;
}

function renderVocab() {
    const cats = [...new Set(appData.vocabulary.map(v => v.cat))];
    let html = `<p class="section-label">Vocabulary by Category</p>
        <div style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap">
            <button class="btn btn-sm btn-primary" onclick="startFlashcards('all')">Flashcards (All)</button>
        </div>`;
    cats.forEach(cat => {
        const words = appData.vocabulary.filter(v => v.cat === cat);
        html += `<div class="card">
            <div class="collapse-header" onclick="toggleCollapse(this)">
                <span class="title">${cat} (${words.length})</span>
                <span class="arrow">▶</span>
            </div>
            <div class="collapse-content">`;
        words.forEach(w => html += `<div class="phrase-item"><span class="phrase-lux">${w.lux}</span><span class="phrase-en">${w.en}</span></div>`);
        html += `<button class="btn btn-sm btn-secondary" style="margin-top:0.5rem" onclick="startFlashcards('${cat}')">Practice ${cat} Flashcards</button></div></div>`;
    });
    return html;
}

function toggleCollapse(el) {
    el.classList.toggle('open');
    const content = el.nextElementSibling;
    content.classList.toggle('show');
}

function startFlashcards(cat) {
    const deck = cat === 'all' ? [...appData.vocabulary] : appData.vocabulary.filter(v => v.cat === cat);
    for (let i = deck.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [deck[i], deck[j]] = [deck[j], deck[i]]; }
    flashcardState = { current: 0, flipped: false, deck };
    currentView = 'flashcardView';
    render();
}

function renderPhrases() {
    let html = `<p class="section-label">Essential Phrases for the Exam</p>`;
    for (const [category, phrases] of Object.entries(appData.usefulPhrases)) {
        html += `<div class="card"><h2>${category}</h2>`;
        phrases.forEach(p => html += `<div class="phrase-item"><span class="phrase-lux">${p.lux}</span><span class="phrase-en">${p.en}</span></div>`);
        html += `</div>`;
    }
    html += `<p class="section-label">Grammar Essentials</p>`;
    appData.grammar.forEach(g => {
        html += `<div class="card"><div class="collapse-header" onclick="toggleCollapse(this)"><span class="title">${g.title}</span><span class="arrow">▶</span></div><div class="collapse-content">${g.content}</div></div>`;
    });
    return html;
}

function renderPractice() {
    let html = `<p class="section-label">Practice</p>
        <div class="card">
            <h2>Vocabulary Quiz</h2>
            <p style="margin-bottom:1rem">Test your vocabulary with multiple choice.</p>
            <button class="btn btn-primary btn-full" onclick="startQuiz()">Start Quiz (20 Questions)</button>
        </div>
        <div class="card">
            <h2>Flashcards</h2>
            <p style="margin-bottom:1rem">Flip through vocabulary cards.</p>
            <button class="btn btn-primary btn-full" onclick="startFlashcards('all')">Start Flashcards</button>
        </div>
        <div class="card">
            <h2>Random Topic Generator</h2>
            <p style="margin-bottom:1rem">Simulate the exam: get 2 random topics, pick one, and practice answering.</p>
            <button class="btn btn-primary btn-full" onclick="randomTopics()">Generate 2 Random Topics</button>
            <div id="random-topics"></div>
        </div>`;
    return html;
}

function randomTopics() {
    const shuffled = [...appData.topics].sort(() => Math.random() - 0.5);
    const t1 = shuffled[0], t2 = shuffled[1];
    const el = document.getElementById('random-topics');
    el.innerHTML = `<div style="margin-top:1rem;padding:1.1rem;background:linear-gradient(135deg,#f8f7ff,#f0ecff);border-radius:14px;border:1px solid rgba(99,102,241,0.1)">
        <p style="font-weight:700;margin-bottom:0.75rem">Your 2 topics:</p>
        <div class="topic-pill active" onclick="showView('topicDetail', {topicId:${t1.id}})" style="display:inline-block;margin:0.25rem">${t1.name}</div>
        <div class="topic-pill active" onclick="showView('topicDetail', {topicId:${t2.id}})" style="display:inline-block;margin:0.25rem">${t2.name}</div>
        <p style="font-size:0.82rem;color:var(--text-secondary);margin-top:0.75rem">Pick one and practice answering for 5 minutes!</p>
    </div>`;
}

let quizState = { questions: [], current: 0, score: 0, answered: false };

function startQuiz() {
    const vocab = [...appData.vocabulary].sort(() => Math.random() - 0.5);
    const qs = [];
    for (let i = 0; i < Math.min(20, vocab.length); i++) {
        const correct = vocab[i];
        const wrongs = appData.vocabulary.filter(v => v.cat === correct.cat && v.lux !== correct.lux).sort(() => Math.random() - 0.5).slice(0, 3);
        if (wrongs.length < 3) {
            const extra = appData.vocabulary.filter(v => v.lux !== correct.lux && !wrongs.includes(v)).sort(() => Math.random() - 0.5);
            while (wrongs.length < 3) wrongs.push(extra.shift());
        }
        const options = [correct.en, ...wrongs.map(w => w.en)].sort(() => Math.random() - 0.5);
        qs.push({ q: correct.lux, correctAnswer: correct.en, options });
    }
    quizState = { questions: qs, current: 0, score: 0, answered: false };
    currentView = 'quizActive';
    render();
}

function renderQuiz() {
    const { questions: qs, current, score, answered } = quizState;
    if (current >= qs.length) return renderQuizResults();
    const q = qs[current];
    const progress = (current / qs.length * 100).toFixed(0);
    let html = `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
            <span style="font-size:0.8rem;color:var(--text-secondary);font-weight:600">${current + 1} / ${qs.length}</span>
            <span style="font-size:0.8rem;color:var(--success);font-weight:700">${score} correct</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        <p class="quiz-question">What does this mean?<br><span style="color:var(--primary)">${q.q}</span></p>
        <div class="quiz-options">`;
    q.options.forEach((opt, i) => {
        let cls = 'quiz-option';
        if (answered) {
            cls += ' disabled';
            if (opt === q.correctAnswer) cls += ' correct';
            else if (opt === quizState.selected && opt !== q.correctAnswer) cls += ' incorrect';
        }
        html += `<div class="${cls}" onclick="selectQuizAnswer('${opt.replace(/'/g, "\\'")}')">${opt}</div>`;
    });
    html += `</div>`;
    if (answered) {
        html += `<div style="margin-top:1.4rem"><button class="btn btn-primary btn-full" onclick="nextQuizQuestion()">Next →</button></div>`;
    }
    html += `</div>`;
    return html;
}

function selectQuizAnswer(ans) {
    if (quizState.answered) return;
    quizState.answered = true;
    quizState.selected = ans;
    if (ans === quizState.questions[quizState.current].correctAnswer) quizState.score++;
    render();
}

function nextQuizQuestion() {
    quizState.current++;
    quizState.answered = false;
    quizState.selected = null;
    render();
}

function renderQuizResults() {
    const { questions: qs, score } = quizState;
    const pct = Math.round(score / qs.length * 100);
    const passed = pct >= 50;
    return `<div class="card score-display">
        <div class="score-num" style="color:${passed ? 'var(--success)' : 'var(--error)'}">${pct}%</div>
        <div class="score-label">${score} / ${qs.length} correct</div>
        <p style="margin-top:1rem;font-size:1.1rem;font-weight:700;color:${passed ? 'var(--success)' : 'var(--error)'}">${passed ? 'GUTT GEMAACH! 🎉' : 'WEIDER ÜBEN! 💪'}</p>
        <div style="margin-top:1.6rem;display:flex;gap:0.8rem;flex-direction:column">
            <button class="btn btn-primary btn-full" onclick="startQuiz()">Try Again</button>
            <button class="btn btn-secondary btn-full" onclick="showView('vocab')">Review Vocabulary</button>
        </div>
    </div>`;
}

function renderFlashcardView() {
    const { deck, current, flipped } = flashcardState;
    if (!deck.length) return '<div class="card"><p>No cards available.</p></div>';
    const card = deck[current];
    return `<div class="card">
        <button class="back-btn" onclick="showView('vocab')">← Back</button>
        <div class="flashcard-counter">${current + 1} / ${deck.length}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${((current + 1) / deck.length * 100).toFixed(0)}%"></div></div>
        <div class="flashcard-container">
            <div class="flashcard" onclick="flipCard()">
                ${flipped
                    ? `<div class="flashcard-back">${card.en}</div>`
                    : `<div class="flashcard-front">${card.lux}</div>`}
            </div>
        </div>
        <p style="text-align:center;font-size:0.76rem;color:var(--text-light);margin:0.5rem 0;font-weight:500">Tap to flip · Swipe to navigate</p>
        <div class="flashcard-controls">
            <button class="btn btn-secondary btn-sm" onclick="prevCard()">←</button>
            <button class="btn btn-secondary btn-sm" onclick="shuffleDeck()">Shuffle</button>
            <button class="btn btn-primary btn-sm" onclick="nextCard()">→</button>
        </div>
    </div>`;
}

function flipCard() { flashcardState.flipped = !flashcardState.flipped; render(); }
function nextCard() { flashcardState.current = (flashcardState.current + 1) % flashcardState.deck.length; flashcardState.flipped = false; render(); }
function prevCard() { flashcardState.current = (flashcardState.current - 1 + flashcardState.deck.length) % flashcardState.deck.length; flashcardState.flipped = false; render(); }
function shuffleDeck() {
    const d = flashcardState.deck;
    for (let i = d.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [d[i], d[j]] = [d[j], d[i]]; }
    flashcardState.current = 0; flashcardState.flipped = false; render();
}

const _origRender = render;
render = function() {
    if (currentView === 'flashcardView') {
        document.getElementById('app').innerHTML = renderFlashcardView();
        return;
    }
    _origRender();
};

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 80 && currentView === 'flashcardView') {
        if (dx < 0) nextCard(); else prevCard();
    }
}, {passive: true});

showView('home');
    </script>
</body>
</html>
